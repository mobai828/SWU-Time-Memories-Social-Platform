    login-url: https://uaaap.swu.edu.cn/cas/login
    logout-url: https://uaaap.swu.edu.cn/cas/logout
    service-validate-url: https://uaaap.swu.edu.cn/cas/serviceValidate
    callback-path: /login/swu/callback
    force-renew: true
    connect-timeout-seconds: 10
    read-timeout-seconds: 15
