<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重置密码</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="page-shell">
    <div class="background-layer" data-auth-background data-storage-key="java:last-reset-background"></div>
    <div class="background-overlay"></div>

    <main class="card">
        <div class="center">
            <a class="brand" th:href="@{/}">西大拾光</a>
            <h1>重置密码</h1>
            <p class="subtitle">设置新的登录密码</p>
        </div>

        <div class="stack" style="margin-top: 28px;">
            <div class="message message-error" th:if="${errorMessage}">
                <svg style="width: 20px; height: 20px; margin-right: 8px; fill: currentColor; flex-shrink: 0;" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                </svg>
                <span th:text="${errorMessage}"></span>
            </div>

            <div class="message message-error" th:if="${!tokenValid}">
                <svg style="width: 20px; height: 20px; margin-right: 8px; fill: currentColor; flex-shrink: 0;" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd" />
                </svg>
                <span>当前重置链接无效或已过期，请重新申请。</span>
            </div>

            <form class="stack" th:if="${tokenValid}" th:action="@{/reset-password}" method="post">
                <input type="hidden" name="token" th:value="${token}">

                <div class="field">
                    <label class="label" for="password">新密码</label>
                    <input class="input" id="password" name="password" type="password" minlength="6" placeholder="至少 6 位字符" required>
                </div>

                <div class="field">
                    <label class="label" for="confirmPassword">确认密码</label>
                    <input class="input" id="confirmPassword" name="confirmPassword" type="password" minlength="6" placeholder="再次输入新密码" required>
                </div>

                <button class="button button-primary" type="submit">保存新密码</button>
            </form>

            <a class="button button-secondary center" th:href="@{/login}">返回登录</a>
        </div>
    </main>
</div>
<script th:src="@{/js/auth-background.js(v='20260406-2')}"></script>
</body>
</html>
